# ===========================
# PROD profile
# ===========================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

app:
  password-reset-url: ${PASSWORD_RESET_URL}

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.hibernate.SQL: ERROR
