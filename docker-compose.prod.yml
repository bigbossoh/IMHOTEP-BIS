services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: gestimoweb
      MYSQL_DATABASE: dbgestimoweb
      MYSQL_USER: gestimo
      MYSQL_PASSWORD: gestimoweb
      TZ: Africa/Abidjan
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -pgestimoweb"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: bigbossoh/imhotep-backend:latest
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_URL: jdbc:mysql://db:3306/dbgestimoweb?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USER: gestimo
      MYSQL_PASSWORD: gestimoweb
      JWT_SECRET: "[a-zA-Z0-9._]^+$GuidelinAurorees8SaisonACfsewwsikkoggishherforAlphabeticalArraNumeralsandOtherSymbo$"
      MAIL_HOST: smtp-fr.securemail.pro
      MAIL_PORT: 587
      MAIL_USERNAME: info@molibetycenter.com
      MAIL_PASSWORD: 2024@Seve2024
      PASSWORD_RESET_URL: http://51.75.142.41/reset-password
      DEFAULT_USER_EMAIL: bossohpaulin@gmail.com
      TZ: Africa/Abidjan
    volumes:
      - backend_data:/home/spring/gestimoweb
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8287"

  frontend:
    image: bigbossoh/imhotep-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
  backend_data:
