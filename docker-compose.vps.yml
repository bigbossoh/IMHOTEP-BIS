services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: gestimoweb
      MYSQL_DATABASE: dbgestimoweb
      MYSQL_USER: gestimo
      MYSQL_PASSWORD: gestimoweb
      TZ: Africa/Abidjan
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -pgestimoweb"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: astairenazaire/imhotep-bis-backend:latest
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      MYSQL_URL: jdbc:mysql://db:3306/dbgestimoweb?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USER: gestimo
      MYSQL_PASSWORD: gestimoweb
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: https://gestimoweb.com,https://www.gestimoweb.com
      JWT_SECRET: change_me_in_prod
      APP_PASSWORD_RESET_URL: https://gestimoweb.com/reset-password
      APP_DEFAULT_USER_EMAIL: bossohpaulin@gmail.com
      APP_DEFAULT_AGENCY_ID: "1"
      TZ: Africa/Abidjan
    volumes:
      - backend_data:/home/spring/gestimoweb
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8287"

  frontend:
    image: astairenazaire/imhotep-bis-frontend:latest
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  db_data:
  backend_data:
  caddy_data:
  caddy_config:

