<div class="ncc-dialog">

  <!-- En-tête -->
  <div class="ncc-dialog__header">
    <div class="ncc-dialog__icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
    </div>
    <div>
      <h2 class="ncc-dialog__title">Nouvelle catégorie</h2>
      <p class="ncc-dialog__subtitle">Renseignez le nom et la description de la catégorie.</p>
    </div>
    <button type="button" class="ncc-dialog__close" (click)="dialogRef.close()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Corps du formulaire -->
  <div class="ncc-dialog__body">
    <div class="ncc-form-group">
      <label class="ncc-form-label" for="nomInput">Nom de la catégorie <span class="ncc-required">*</span></label>
      <input
        id="nomInput"
        type="text"
        class="ncc-form-control"
        [(ngModel)]="nom"
        placeholder="Ex : Studio, Appartement T2, Suite..."
        autocomplete="off"
      />
    </div>

    <div class="ncc-form-group">
      <label class="ncc-form-label" for="descInput">Description</label>
      <textarea
        id="descInput"
        class="ncc-form-control ncc-form-control--textarea"
        [(ngModel)]="descpition"
        placeholder="Description optionnelle de la catégorie..."
        rows="3"
      ></textarea>
    </div>
  </div>

  <!-- Pied -->
  <div class="ncc-dialog__footer">
    <button type="button" class="ncc-btn ncc-btn--ghost" (click)="dialogRef.close()">
      Annuler
    </button>
    <button
      type="button"
      class="ncc-btn ncc-btn--primary"
      (click)="onSaveForm()"
      [disabled]="!nom?.trim()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Enregistrer
    </button>
  </div>

</div>
