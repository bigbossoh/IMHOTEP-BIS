server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 5m;

  location /gestimoweb/ {
    proxy_pass http://backend:8287/gestimoweb/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /actuator/ {
    proxy_pass http://backend:8287/actuator/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /swagger-ui/ {
    proxy_pass http://backend:8287/swagger-ui/;
    proxy_set_header Host $host;
  }

  location /v3/api-docs/ {
    proxy_pass http://backend:8287/v3/api-docs/;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

